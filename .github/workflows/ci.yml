name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md"]
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  lint:
    name: Lint
    needs: [install]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm lint

  typecheck:
    name: Type check
    needs: [install]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm typecheck

  format-check:
    name: Format check
    needs: [install]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm format:check

  build:
    name: Build
    needs: [install]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build
        run: pnpm build | tee build-output.txt

      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: build-output.txt
          retention-days: 5

  bundle-size:
    name: Bundle size
    needs: [build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: build-output

      - name: Parse build output and comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('build-output.txt', 'utf8');

            // Extract the route size table from Next.js build output
            const lines = raw.split('\n');
            const routeLines = [];
            let inTable = false;

            for (const line of lines) {
              // Next.js outputs "Route (app)" or "тЧЛ" / "тЧП" / "╞Т" / "тЧР" for routes
              if (line.includes('Route (app)') || line.includes('First Load JS')) {
                inTable = true;
              }
              if (inTable) {
                routeLines.push(line);
                // Table ends after the "+ First Load JS shared by all" summary
                if (line.includes('First Load JS shared by all')) {
                  // Grab a few more lines for the shared chunks breakdown
                  const idx = lines.indexOf(line);
                  for (let i = idx + 1; i < Math.min(idx + 10, lines.length); i++) {
                    if (lines[i].trim() === '') break;
                    routeLines.push(lines[i]);
                  }
                  break;
                }
              }
            }

            let body;
            if (routeLines.length > 0) {
              body = `## Bundle Size Report\n\n\`\`\`\n${routeLines.join('\n')}\n\`\`\`\n\nЁЯдЦ Generated by CI`;
            } else {
              body = `## Bundle Size Report\n\nCould not parse build output.\n\nЁЯдЦ Generated by CI`;
            }

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Bundle Size Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
